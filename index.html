<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Matching Game</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

  <div id="gameHeader">
    <h2>Memory Matching Game</h2>
    <div id="statsBar">
      <div class="stat-box">
        <div class="stat-label">Moves</div>
        <div class="stat-value" id="moves">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Time</div>
        <div class="stat-value" id="timer">0:00</div>
      </div>
    </div>
    <button id="newGameBtn">↺ New Game</button>
  </div>

  <div id="gameBoard"></div>

  <div id="winMessage">
    <div class="win-card">
      <span class="win-emoji">🏆</span>
      <h2>You Win!</h2>
      <p style="color:var(--muted); font-size:0.8rem;">All pairs matched!</p>
      <div class="win-stats">
        <div class="win-stat">
          <div class="win-stat-val" id="finalMoves">-</div>
          <div class="win-stat-lbl">Moves</div>
        </div>
        <div class="win-stat">
          <div class="win-stat-val" id="finalTime">-</div>
          <div class="win-stat-lbl">Time</div>
        </div>
      </div>
      <button class="win-btn" id="playAgainBtn">Play Again</button>
    </div>
  </div>

 
  <audio id="matchSound"></audio>
  <audio id="wrongSound"></audio>

 
  <script src="index.js"></script>

</body>
</html>
